<div class="group-list">
  @if (items().length) {
    <article class="group-card">
      <h3>Legacy grouped view placeholder</h3>
      <p>Grouped rendering is currently disabled in the active frontend flow.</p>
    </article>
  } @else {
    <article class="group-card is-empty">
      <h3>No grouped data</h3>
      <p>This placeholder remains only to keep the scaffold compile-safe.</p>
    </article>
  }
</div>
