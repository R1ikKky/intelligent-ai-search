<div class="search-page">
  <div class="search-page__query-zone">
    <app-search-toolbar
      [query]="currentQuery()"
      [loading]="(loading$ | async) ?? false"
      (queryChanged)="onQueryChanged($event)"
      (searchSubmitted)="onSearchSubmitted($event)"
    />
    <app-search-suggestions
      [suggestions]="(suggestions$ | async) ?? []"
      (suggestionSelected)="onSuggestionSelected($event)"
    />
  </div>

  @if (error$ | async; as error) {
    <p class="search-page__error">{{ error }}</p>
  }

  <section class="search-page__results">
    <app-results-group-list
      [response]="response$ | async"
      (itemSelected)="onResultSelected($event)"
      (qualifiedCardView)="onQualifiedCardView($event)"
      (deepCardInterest)="onDeepCardInterest($event)"
    />
  </section>
</div>
