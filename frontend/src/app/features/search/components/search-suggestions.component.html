@if (suggestions().length > 0) {
  <ul class="suggestions-panel" role="listbox" aria-label="Подсказки поиска">
    @for (item of suggestions(); track item.kind + ':' + item.text) {
      <li role="option">
        <button type="button" (click)="selectSuggestion(item.text)">
          <span class="suggestion-text">{{ item.text }}</span>
        </button>
      </li>
    }
  </ul>
}
