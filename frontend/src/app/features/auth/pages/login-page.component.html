<div class="auth-page">
  <app-section-card title="Login" eyebrow="Auth">
    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Customer INN</span>
        <input type="text" formControlName="customerInn" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" formControlName="password" />
      </label>

      @if (error$ | async; as error) {
        <p class="auth-form__error">{{ error }}</p>
      }

      <div class="auth-form__actions">
        <button type="submit" [disabled]="(loading$ | async) ?? false">Sign in</button>
        <a routerLink="/auth/register">Go to registration</a>
      </div>
    </form>
  </app-section-card>
</div>
