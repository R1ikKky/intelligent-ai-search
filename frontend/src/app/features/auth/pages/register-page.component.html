<!-- Page header -->
<header class="rp-header">
  <a class="rp-header__logo" routerLink="/login">
    <div class="rp-logo-icon">
      <span class="rp-logo-box rp-logo-box--back"></span>
      <span class="rp-logo-box rp-logo-box--front"></span>
    </div>
    <div class="rp-logo-text">
      <span class="rp-logo-text__line1">ПОРТАЛ</span>
      <span class="rp-logo-text__line2">ПОСТАВЩИКОВ</span>
    </div>
  </a>

  <div class="rp-header__right">
    <a class="rp-header__login-btn" routerLink="/login">Войти</a>
    <div class="rp-header__icons">
      <button class="rp-header__icon-btn" type="button" title="Центр поддержки">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 11a9 9 0 1 1 18 0v1a3 3 0 0 1-3 3h-1a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2h1"/>
          <path d="M3 12a3 3 0 0 0 3 3h1a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2H6"/>
          <path d="M21 16v1a4 4 0 0 1-4 4h-3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="rp-header__icon-btn" type="button" title="Помощь">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 2a6 6 0 0 1 4.243 10.243L17 15H7l.757-2.757A6 6 0 0 1 12 2z"/>
          <path d="M9 17h6M10 20h4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Page body -->
<div class="rp-page">

  <!-- Decorative cubes -->
  <span class="rp-cube rp-cube--1"></span>
  <span class="rp-cube rp-cube--2"></span>
  <span class="rp-cube rp-cube--3"></span>
  <span class="rp-cube rp-cube--4"></span>
  <span class="rp-cube rp-cube--5"></span>

  <!-- Registration card -->
  <div class="rp-card">

    <div class="rp-card__body">
      <h2 class="rp-card__title">Регистрация</h2>

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="rp-field">
          <label class="rp-field__label" for="reg-inn">ИНН</label>
          <input
            id="reg-inn"
            class="rp-field__input"
            type="text"
            formControlName="customerInn"
            placeholder="Введите ИНН организации"
            autocomplete="off"
          />
        </div>

        <div class="rp-field">
          <label class="rp-field__label" for="reg-name">Название организации</label>
          <input
            id="reg-name"
            class="rp-field__input"
            type="text"
            formControlName="customerName"
            placeholder="Введите название организации"
            autocomplete="organization"
          />
        </div>

        <div class="rp-field">
          <label class="rp-field__label">Регион поставки</label>
          <app-region-select formControlName="customerRegion" />
        </div>

        <div class="rp-field">
          <label class="rp-field__label" for="reg-password">Пароль</label>
          <div class="rp-field__wrap">
            <input
              id="reg-password"
              class="rp-field__input"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Придумайте пароль"
              autocomplete="new-password"
            />
            <button class="rp-field__eye" type="button" (click)="togglePassword()">
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/>
                </svg>
              }
            </button>
          </div>
        </div>

        @if (error$ | async; as error) {
          <p class="rp-error">{{ error }}</p>
        }

        <div class="rp-card__actions">
          <button
            class="rp-card__submit"
            type="submit"
            [disabled]="(loading$ | async) ?? false"
          >
            @if (loading$ | async) { Создание… } @else { Зарегистрироваться }
          </button>
        </div>

      </form>
    </div>

    <div class="rp-card__footer">
      Уже есть аккаунт?&nbsp;
      <a class="rp-card__footer-link" routerLink="/login">Войти</a>
    </div>

  </div>
</div>
