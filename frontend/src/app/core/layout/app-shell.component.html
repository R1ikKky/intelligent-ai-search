<header class="pp-header">
  <div class="pp-header__inner">

    <!-- Logo -->
    <a class="pp-logo" routerLink="/search">
      <div class="pp-logo__icon">
        <span class="pp-logo__box pp-logo__box--back"></span>
        <span class="pp-logo__box pp-logo__box--front"></span>
      </div>
      <div class="pp-logo__text">
        <span class="pp-logo__line1">ПОРТАЛ</span>
        <span class="pp-logo__line2">ПОСТАВЩИКОВ</span>
      </div>
    </a>

    <!-- Nav -->
    <nav class="pp-nav">
      <button class="pp-nav__item" type="button">
        <svg class="pp-nav__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="3" y1="5" x2="17" y2="5"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
          <line x1="3" y1="15" x2="17" y2="15"/>
        </svg>
        Меню
      </button>

      <button class="pp-nav__item" type="button">
        <svg class="pp-nav__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M10 2a5 5 0 0 1 3.5 8.5L14 13H6l.5-2.5A5 5 0 0 1 10 2z"/>
          <path d="M8 15h4M9 17h2" stroke-linecap="round"/>
        </svg>
        Центр поддержки
      </button>

      <button class="pp-nav__item" type="button">
        <svg class="pp-nav__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M3 4h2l2.5 8h7L17 7H6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="16.5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="16.5" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
        Корзина
      </button>

      <button class="pp-nav__item" type="button">
        <svg class="pp-nav__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M10 2l8 16-8-4-8 4 8-16z" stroke-linejoin="round"/>
        </svg>
        Московская область
      </button>
    </nav>

    <!-- Spacer -->
    <div class="pp-header__spacer"></div>

    <!-- Search bar (expanded) -->
    @if (isSearchOpen()) {
      <form class="pp-search-bar" [formGroup]="searchForm" (ngSubmit)="submitSearch()">
        <input
          id="header-search-input"
          class="pp-search-bar__input"
          type="text"
          formControlName="query"
          placeholder="Поиск по СТЕ, категории или атрибуту…"
          (keydown.escape)="toggleSearch()"
        />
        <button class="pp-search-bar__btn" type="submit">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="8.5" cy="8.5" r="5.5"/>
            <line x1="12.5" y1="12.5" x2="18" y2="18" stroke-linecap="round"/>
          </svg>
        </button>
      </form>
    }

    <!-- Actions -->
    <div class="pp-actions">
      <button class="pp-actions__icon-btn" type="button" (click)="toggleSearch()" [class.is-active]="isSearchOpen()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8.5" cy="8.5" r="5.5"/>
          <line x1="12.5" y1="12.5" x2="18" y2="18" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="pp-actions__icon-btn pp-actions__lang" type="button">
        <span class="pp-flag">
          <span class="pp-flag__stripe pp-flag__stripe--white"></span>
          <span class="pp-flag__stripe pp-flag__stripe--blue"></span>
          <span class="pp-flag__stripe pp-flag__stripe--red"></span>
        </span>
        <svg class="pp-actions__caret" viewBox="0 0 10 6" fill="currentColor">
          <path d="M0 0l5 6 5-6z"/>
        </svg>
      </button>

      <!-- Always authenticated inside app-shell -->
      @if (identity$ | async; as identity) {
        <span class="pp-actions__username">{{ identity.login }}</span>
      }
      <button class="pp-actions__logout" type="button" (click)="logout()">Выйти</button>
    </div>

  </div>
</header>

<main class="pp-content">
  <router-outlet />
</main>
