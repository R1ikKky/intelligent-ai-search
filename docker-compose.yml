# Copy .env.example to .env to override secrets.
# Данные контейнеров по умолчанию на диске D: (bind mount). Переопределение: DOCKER_VOLUME_ROOT в .env

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-search_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_pass}
      POSTGRES_DB: ${POSTGRES_DB:-search_db}
    ports:
      - '5432:5432'
    volumes:
      - ${DOCKER_VOLUME_ROOT:-D:/docker-data/intelligent-ai-search}/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-search_user} -d ${POSTGRES_DB:-search_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  dataset-loader:
    build:
      context: .
      dockerfile: docker/dataset-loader/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-search_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_pass}
      POSTGRES_DB: ${POSTGRES_DB:-search_db}
      DATA_DIR: /data
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Распаковка data/<ES_SNAPSHOT_ZIP> (по умолчанию ste_search_es_snapshot.zip) в data/elasticsearch-snapshot-repo/
  elasticsearch-snapshot-unpack:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile.snapshot-tools
    image: intelligent-ai-search-snapshot-tools
    volumes:
      - ./data:/data
      - ./docker/elasticsearch/snapshot-unpack.sh:/snapshot-unpack.sh:ro
    environment:
      ES_SNAPSHOT_ZIP: ${ES_SNAPSHOT_ZIP:-ste_search_es_snapshot.zip}
    entrypoint: ["sh", "/snapshot-unpack.sh"]
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - '9200:9200'
    depends_on:
      elasticsearch-snapshot-unpack:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_VOLUME_ROOT:-D:/docker-data/intelligent-ai-search}/elasticsearch:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      # Файловый репозиторий снимков (zip кладите в data/ — см. docks/elasticsearch-sharing.md)
      - ./data/elasticsearch-snapshot-repo:/usr/share/elasticsearch/snapshots
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -s -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  # Восстановление ste_search из repo/ после старта ES (один раз, пока нет data/.ste_search_es_restore_done)
  elasticsearch-snapshot-restore:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile.snapshot-tools
    image: intelligent-ai-search-snapshot-tools
    volumes:
      - ./data:/data
      - ./data/elasticsearch-snapshot-repo:/snapshots:ro
      - ./docker/elasticsearch/snapshot-restore.sh:/snapshot-restore.sh:ro
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
    entrypoint: ["sh", "/snapshot-restore.sh"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: beckend/Dockerfile
    ports:
      - '3000:8000'
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-search_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-search_pass}
      POSTGRES_DB: ${POSTGRES_DB:-search_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-min-32-chars!!}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      elasticsearch-snapshot-restore:
        condition: service_completed_successfully
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '4200:80'
    restart: unless-stopped
